<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aether-Link Lite v2</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.min.js"></script>
  <style>
    html, body {
      margin: 0; padding: 0; overflow: hidden;
      background: #000; color: #bdfcff;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    #webcam {
      position: fixed; inset: 0;
      width: 100vw; height: 100vh;
      object-fit: cover; transform: scaleX(-1);
      opacity: 0.05; pointer-events: none; z-index: 0;
    }
    canvas {
      position: fixed !important; inset: 0; z-index: 1;
    }
    #hud {
      position: fixed; top: 10px; left: 10px; z-index: 5;
      font-size: 11px; line-height: 1.6;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(0,255,255,0.15);
      padding: 8px 12px; border-radius: 8px;
      min-width: 155px; backdrop-filter: blur(4px);
    }
    #hud .label { color: #5aa; }
    #hud .val   { color: #7df9ff; font-weight: bold; }
    #gestureBar {
      position: fixed; bottom: 12px; left: 50%;
      transform: translateX(-50%); z-index: 5;
      font-size: 11px; color: #5de;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(0,255,255,0.12);
      padding: 6px 16px; border-radius: 20px;
      white-space: nowrap; backdrop-filter: blur(4px);
    }
    #startOverlay {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: center;
      justify-content: center; flex-direction: column;
      background: #000; gap: 16px;
    }
    #startBtn {
      background: #06141a; color: #7df9ff;
      border: 1px solid #1de9ff;
      padding: 14px 28px; border-radius: 10px;
      font-size: 15px; cursor: pointer;
      transition: background 0.2s;
    }
    #startBtn:hover { background: #0a2a35; }
    #status { color: #8aa; font-size: 13px; }
  </style>
</head>
<body>
  <video id="webcam" autoplay playsinline muted></video>

  <div id="hud">
    <div><span class="label">FPS:</span> <span class="val" id="fps">0</span></div>
    <div><span class="label">Hands:</span> <span class="val" id="handCount">0</span></div>
    <div><span class="label">Gesture:</span> <span class="val" id="gesture">IDLE</span></div>
    <div><span class="label">Particles:</span> <span class="val" id="pCount">0</span></div>
  </div>

  <div id="gestureBar">
    ✊ Fist · ☝ Point · ✌ Peace · 🖐 Palm · 🤏 Pinch · 👍 Thumb · 🔫 Gun · 🌀 Three · 🤙 Shaka
  </div>

  <div id="startOverlay">
    <button id="startBtn">▶ Start Aether-Link</button>
    <div id="status">Waiting for user action…</div>
  </div>

  <script>
    // =============================================================
    //  PART 1 — CONFIG & APP STATE
    // =============================================================
    const CONFIG = {
      // --- Performance (low-res = faster) ---
      cameraWidth:    320,        // halved from 640
      cameraHeight:   240,        // halved from 480
      cameraFPS:      60,
      skipFrames:     1,          // process every N-th frame (1=all, 2=half)
      canvasScale:    1,          // 1 = native, 0.75 = 75% res

      // --- Particles ---
      maxParticles:   80,
      maxTrailPoints: 30,
      maxProjectiles: 12,

      // --- Detection ---
      pinchThreshold:    0.055,
      fistThreshold:     0.08,
      hudUpdateMs:       150,
      maxHands:          2,
      modelComplexity:   0,       // 0 = lite (fastest)
      minDetection:      0.55,
      minTracking:       0.5,

      // --- Visual ---
      trailFade:         0.92,
      bgAlpha:           40,
    };

    // Global app state
    const App = {
      started:        false,
      video:          null,
      hands:          null,
      latestResults:  null,
      handData:       [],
      globalGesture:  "IDLE",
      prevGesture:    "IDLE",
      lastHudUpdate:  0,
      frameIndex:     0,

      // Trail (for POINT gesture)
      trails:         [],    // {points:[], color, alpha}

      // Projectiles (for FINGER_GUN)
      projectiles:   [],    // {x,y,vx,vy,life,color}

      // Shockwave (for FIST)
      shockwaves:    [],    // {x,y,radius,maxRadius,alpha}

      // Vortex angle (for THREE_FINGERS)
      vortexAngle:   0,
    };
  </script>
  <script>
    // =============================================================
    //  PART 2 — CLASSES & HAND HELPERS
    // =============================================================

    // --- Hand skeleton connections ---
    const HAND_CONNECTIONS = [
      [0,1],[1,2],[2,3],[3,4],
      [0,5],[5,6],[6,7],[7,8],
      [0,9],[9,10],[10,11],[11,12],
      [0,13],[13,14],[14,15],[15,16],
      [0,17],[17,18],[18,19],[19,20],
      [5,9],[9,13],[13,17]
    ];

    function mapToScreen(lm) {
      return {
        x: (1 - lm.x) * window.innerWidth,
        y: lm.y  * window.innerHeight,
        z: lm.z || 0
      };
    }

    function dist2(a, b) {
      const dx = a.x - b.x, dy = a.y - b.y;
      return Math.sqrt(dx*dx + dy*dy);
    }

    function dist3(a, b) {
      const dx = a.x - b.x, dy = a.y - b.y, dz = (a.z||0) - (b.z||0);
      return Math.sqrt(dx*dx + dy*dy + dz*dz);
    }

    function distSq2(a, b) {
      const dx = a.x - b.x, dy = a.y - b.y;
      return dx*dx + dy*dy;
    }

    // Finger extended check (screen-space: lower y = higher)
    function fingerExtended(sLms, tipIdx, pipIdx) {
      return sLms[tipIdx].y < sLms[pipIdx].y;
    }

    function fingerCurled(sLms, tipIdx, pipIdx) {
      return sLms[tipIdx].y > sLms[pipIdx].y;
    }

    // ---- Gesture recognizers (all use screenLandmarks for y-axis) ----

    function isOpenPalm(sLms) {
      return fingerExtended(sLms,8,6) && fingerExtended(sLms,12,10) &&
             fingerExtended(sLms,16,14) && fingerExtended(sLms,20,18);
    }

    function isFist(sLms) {
      return fingerCurled(sLms,8,6) && fingerCurled(sLms,12,10) &&
             fingerCurled(sLms,16,14) && fingerCurled(sLms,20,18) &&
             fingerCurled(sLms,4,3);
    }

    function isThumbsUp(sLms) {
      const thumbUp = sLms[4].y < sLms[3].y;
      return thumbUp &&
             fingerCurled(sLms,8,6) && fingerCurled(sLms,12,10) &&
             fingerCurled(sLms,16,14) && fingerCurled(sLms,20,18);
    }

    function isPoint(sLms) {
      return fingerExtended(sLms,8,6) &&
             fingerCurled(sLms,12,10) && fingerCurled(sLms,16,14) &&
             fingerCurled(sLms,20,18);
    }

    function isPeace(sLms) {
      return fingerExtended(sLms,8,6) && fingerExtended(sLms,12,10) &&
             fingerCurled(sLms,16,14) && fingerCurled(sLms,20,18);
    }

    function isThreeFingers(sLms) {
      return fingerExtended(sLms,8,6) && fingerExtended(sLms,12,10) &&
             fingerExtended(sLms,16,14) && fingerCurled(sLms,20,18);
    }

    function isFingerGun(sLms) {
      const thumbUp = sLms[4].y < sLms[3].y;
      return thumbUp && fingerExtended(sLms,8,6) &&
             fingerCurled(sLms,12,10) && fingerCurled(sLms,16,14) &&
             fingerCurled(sLms,20,18);
    }

    function isShaka(sLms) {
      const thumbOut = sLms[4].y < sLms[3].y;
      return thumbOut && fingerCurled(sLms,8,6) &&
             fingerCurled(sLms,12,10) && fingerCurled(sLms,16,14) &&
             fingerExtended(sLms,20,18);
    }

    // ---- Bounding box ----
    function computeBBox(sLms) {
      let x0=Infinity, y0=Infinity, x1=-Infinity, y1=-Infinity;
      for (const p of sLms) {
        if (p.x<x0) x0=p.x; if (p.y<y0) y0=p.y;
        if (p.x>x1) x1=p.x; if (p.y>y1) y1=p.y;
      }
      return { x:x0, y:y0, w:x1-x0, h:y1-y0 };
    }

    // =============================================================
    //  PARTICLE (lightweight)
    // =============================================================
    class Particle {
      constructor() { this.reset(); }

      reset() {
        this.x  = Math.random() * window.innerWidth;
        this.y  = Math.random() * window.innerHeight;
        this.vx = (Math.random()-0.5) * 1.0;
        this.vy = (Math.random()-0.5) * 1.0;
        this.sz = 1 + Math.random() * 2.5;
        this.layer = Math.random() < 0.5 ? 0 : 1;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        const W = window.innerWidth, H = window.innerHeight;
        if (this.x<0) this.x+=W; if (this.x>W) this.x-=W;
        if (this.y<0) this.y+=H; if (this.y>H) this.y-=H;
        this.vx *= 0.993;
        this.vy *= 0.993;
      }

      attract(tx, ty, str = 0.03) {
        const dx = tx-this.x, dy = ty-this.y;
        const d = Math.max(20, Math.sqrt(dx*dx+dy*dy));
        this.vx += (dx/d)*str;
        this.vy += (dy/d)*str;
      }

      repel(tx, ty, str = 1.0, rad = 200) {
        const dx = this.x-tx, dy = this.y-ty;
        const dSq = dx*dx+dy*dy;
        if (dSq > 0 && dSq < rad*rad) {
          const d = Math.sqrt(dSq);
          const f = (1-d/rad)*str;
          this.vx += (dx/d)*f;
          this.vy += (dy/d)*f;
        }
      }

      orbit(cx, cy, str = 0.02, rad = 180) {
        const dx = this.x-cx, dy = this.y-cy;
        const dSq = dx*dx+dy*dy;
        if (dSq < rad*rad && dSq > 100) {
          const d = Math.sqrt(dSq);
          // tangential force (perpendicular)
          this.vx += (-dy/d)*str;
          this.vy += ( dx/d)*str;
          // gentle inward pull
          this.vx -= (dx/d)*str*0.3;
          this.vy -= (dy/d)*str*0.3;
        }
      }
    }

    // Pre-allocate particles
    const particles = [];
    for (let i = 0; i < CONFIG.maxParticles; i++) particles.push(new Particle());
  </script>
  <script>
    // =============================================================
    //  PART 3 — MEDIAPIPE + GESTURE STATE MACHINE
    // =============================================================

    async function setupHands() {
      App.hands = new Hands({
        locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${f}`
      });
      App.hands.setOptions({
        maxNumHands:           CONFIG.maxHands,
        modelComplexity:       CONFIG.modelComplexity,
        minDetectionConfidence: CONFIG.minDetection,
        minTrackingConfidence:  CONFIG.minTracking
      });
      App.hands.onResults(onResults);
    }

    function onResults(results) {
      App.latestResults = results;
      App.handData = [];

      const multi = results.multiHandLandmarks || [];
      const sides  = results.multiHandedness || [];

      for (let i = 0; i < multi.length; i++) {
        const lms  = multi[i];
        const sLms = lms.map(mapToScreen);
        const bbox = computeBBox(sLms);

        const indexTip = sLms[8];
        const thumbTip = sLms[4];
        const middleTip = sLms[12];
        const palm     = sLms[0];
        const pinchMid = {
          x: (indexTip.x + thumbTip.x) * 0.5,
          y: (indexTip.y + thumbTip.y) * 0.5
        };

        const pinchDist = dist3(lms[4], lms[8]);
        const pinching  = pinchDist < CONFIG.pinchThreshold;

        App.handData.push({
          label:       sides[i]?.label || "Hand",
          landmarks:   lms,
          sLms,
          bbox,
          indexTip, thumbTip, middleTip, palm, pinchMid,
          pinchDist, pinching,
          // Gesture booleans
          fist:         isFist(sLms),
          thumbsUp:     isThumbsUp(sLms),
          openPalm:     isOpenPalm(sLms),
          point:        isPoint(sLms),
          peace:        isPeace(sLms),
          threeFingers: isThreeFingers(sLms),
          fingerGun:    isFingerGun(sLms),
          shaka:        isShaka(sLms),
        });
      }

      resolveGlobalGesture();
    }

    // Priority-ordered gesture resolution
    function resolveGlobalGesture() {
      const hd = App.handData;
      App.prevGesture = App.globalGesture;

      if (hd.length === 0) { App.globalGesture = "IDLE"; return; }

      // --- Two-hand combos first ---
      if (hd.length === 2) {
        if (hd[0].pinching && hd[1].pinching) {
          App.globalGesture = "DUAL_PINCH"; return;
        }
        if (dist2(hd[0].palm, hd[1].palm) > window.innerWidth * 0.35) {
          App.globalGesture = "TWO_SPREAD"; return;
        }
      }

      // --- Single-hand (first match wins) ---
      for (const h of hd) {
        if (h.fist)         { App.globalGesture = "FIST";         return; }
      }
      for (const h of hd) {
        if (h.fingerGun)    { App.globalGesture = "FINGER_GUN";   return; }
      }
      for (const h of hd) {
        if (h.thumbsUp)     { App.globalGesture = "THUMBS_UP";    return; }
      }
      for (const h of hd) {
        if (h.shaka)        { App.globalGesture = "SHAKA";        return; }
      }
      for (const h of hd) {
        if (h.pinching)     { App.globalGesture = "PINCH";        return; }
      }
      for (const h of hd) {
        if (h.point)        { App.globalGesture = "POINT";        return; }
      }
      for (const h of hd) {
        if (h.peace)        { App.globalGesture = "PEACE";        return; }
      }
      for (const h of hd) {
        if (h.threeFingers) { App.globalGesture = "VORTEX";       return; }
      }
      for (const h of hd) {
        if (h.openPalm)     { App.globalGesture = "OPEN_PALM";    return; }
      }

      App.globalGesture = "TRACKING";
    }

    // --- Side effects on gesture transitions ---
    function onGestureEdge(prev, curr) {
      // FIST just activated → spawn shockwave
      if (curr === "FIST" && prev !== "FIST") {
        for (const h of App.handData) {
          if (h.fist) {
            App.shockwaves.push({
              x: h.palm.x, y: h.palm.y,
              radius: 10, maxRadius: 260, alpha: 255
            });
          }
        }
      }
      // FINGER_GUN just activated → fire projectile
      if (curr === "FINGER_GUN" && prev !== "FINGER_GUN") {
        for (const h of App.handData) {
          if (h.fingerGun) {
            const dx = h.indexTip.x - h.palm.x;
            const dy = h.indexTip.y - h.palm.y;
            const mag = Math.sqrt(dx*dx+dy*dy) || 1;
            App.projectiles.push({
              x: h.indexTip.x, y: h.indexTip.y,
              vx: (dx/mag)*14, vy: (dy/mag)*14,
              life: 60,
              hue: Math.random()*60 + 160
            });
            if (App.projectiles.length > CONFIG.maxProjectiles) {
              App.projectiles.shift();
            }
          }
        }
      }
    }

    // --- Frame-skipping tracking loop ---
    async function trackingLoop() {
      if (!App.started || !App.video || !App.hands) return;
      App.frameIndex++;

      if (App.video.readyState >= 2 && App.frameIndex % CONFIG.skipFrames === 0) {
        await App.hands.send({ image: App.video });
      }

      requestAnimationFrame(trackingLoop);
    }
  </script>
  <script>
    // =============================================================
    //  PART 4 — RENDERING & STARTUP
    // =============================================================

    const sketch = (p) => {
      let W, H;

      p.setup = () => {
        W = Math.floor(window.innerWidth  * CONFIG.canvasScale);
        H = Math.floor(window.innerHeight * CONFIG.canvasScale);
        const c = p.createCanvas(W, H);
        if (CONFIG.canvasScale < 1) {
          c.style('width',  window.innerWidth  + 'px');
          c.style('height', window.innerHeight + 'px');
        }
        p.colorMode(p.HSB, 360, 100, 100, 255);
      };

      p.windowResized = () => {
        W = Math.floor(window.innerWidth  * CONFIG.canvasScale);
        H = Math.floor(window.innerHeight * CONFIG.canvasScale);
        p.resizeCanvas(W, H);
      };

      p.draw = () => {
        // Detect gesture transitions
        onGestureEdge(App.prevGesture, App.globalGesture);

        p.background(0, 0, 0, CONFIG.bgAlpha);

        const S = CONFIG.canvasScale;

        // ---- Update & draw particles ----
        for (const pt of particles) {
          pt.vx += (Math.random()-0.5)*0.008;
          pt.vy += (Math.random()-0.5)*0.008;

          for (const h of App.handData) {
            if (h.pinching) pt.attract(h.pinchMid.x*S, h.pinchMid.y*S, 0.04);
            if (h.openPalm) pt.repel(h.palm.x*S, h.palm.y*S, 0.16, 130);
            if (h.peace)    pt.repel(h.middleTip.x*S, h.middleTip.y*S, 0.08, 100);
            if (h.threeFingers) pt.orbit(h.palm.x*S, h.palm.y*S, 0.04, 180);
            if (h.shaka) {
              pt.vx += (Math.random()-0.5)*0.15;
              pt.vy += (Math.random()-0.5)*0.15;
            }
          }

          if (App.globalGesture === "DUAL_PINCH" && App.handData.length === 2) {
            const mx = (App.handData[0].palm.x + App.handData[1].palm.x)*0.5*S;
            const my = (App.handData[0].palm.y + App.handData[1].palm.y)*0.5*S;
            pt.attract(mx, my, 0.055);
          }
          if (App.globalGesture === "TWO_SPREAD" && App.handData.length === 2) {
            const mx = (App.handData[0].palm.x + App.handData[1].palm.x)*0.5*S;
            const my = (App.handData[0].palm.y + App.handData[1].palm.y)*0.5*S;
            pt.repel(mx, my, 0.28, 280);
          }
          if (App.globalGesture === "THUMBS_UP") {
            pt.vx *= 1.008; pt.vy *= 1.008;
          }

          pt.update();

          // Draw particle
          const hue = pt.layer === 0 ? 190 : 200;
          const bri = pt.layer === 0 ? 60 : 90;
          const alp = pt.layer === 0 ? 80 : 170;
          p.noStroke();
          p.fill(hue, 60, bri, alp);
          p.circle(pt.x, pt.y, pt.sz);
        }

        // ---- Trails (POINT gesture) ----
        for (const h of App.handData) {
          if (h.point) {
            let trail = App.trails.find(t => t.id === h.label);
            if (!trail) {
              trail = { id: h.label, pts: [] };
              App.trails.push(trail);
            }
            trail.pts.push({ x: h.indexTip.x*S, y: h.indexTip.y*S });
            if (trail.pts.length > CONFIG.maxTrailPoints) trail.pts.shift();
          }
        }
        // Draw & fade trails
        for (let i = App.trails.length - 1; i >= 0; i--) {
          const tr = App.trails[i];
          if (tr.pts.length < 2) { App.trails.splice(i,1); continue; }
          p.noFill(); p.strokeWeight(2);
          for (let j = 1; j < tr.pts.length; j++) {
            const a = Math.floor((j / tr.pts.length) * 200);
            p.stroke(280, 80, 100, a);
            p.line(tr.pts[j-1].x, tr.pts[j-1].y, tr.pts[j].x, tr.pts[j].y);
          }
          // Glow dot at tip
          const tip = tr.pts[tr.pts.length-1];
          p.noStroke(); p.fill(280, 60, 100, 220);
          p.circle(tip.x, tip.y, 8);
          // Fade if gesture ended
          const active = App.handData.some(h => h.point && h.label === tr.id);
          if (!active) tr.pts.splice(0, 3);
        }

        // ---- Projectiles (FINGER_GUN) ----
        for (let i = App.projectiles.length-1; i >= 0; i--) {
          const pr = App.projectiles[i];
          pr.x += pr.vx; pr.y += pr.vy;
          pr.life--;
          if (pr.life <= 0 || pr.x<0 || pr.x>W || pr.y<0 || pr.y>H) {
            App.projectiles.splice(i,1); continue;
          }
          const a = Math.floor((pr.life/60)*220);
          p.noStroke(); p.fill(pr.hue, 90, 100, a);
          p.circle(pr.x*S, pr.y*S, 6);
          p.fill(pr.hue, 40, 100, a*0.4);
          p.circle(pr.x*S, pr.y*S, 14);

          // Repel nearby particles
          for (const pt of particles) pt.repel(pr.x*S, pr.y*S, 0.6, 60);
        }

        // ---- Shockwaves (FIST) ----
        for (let i = App.shockwaves.length-1; i >= 0; i--) {
          const sw = App.shockwaves[i];
          sw.radius += 6;
          sw.alpha  -= 5;
          if (sw.alpha <= 0 || sw.radius > sw.maxRadius) {
            App.shockwaves.splice(i,1); continue;
          }
          p.noFill();
          p.stroke(20, 100, 100, sw.alpha);
          p.strokeWeight(2);
          p.circle(sw.x*S, sw.y*S, sw.radius*2);
          p.stroke(40, 80, 90, sw.alpha*0.5);
          p.circle(sw.x*S, sw.y*S, sw.radius*1.4);

          // Push particles outward
          for (const pt of particles) pt.repel(sw.x*S, sw.y*S, 0.5, sw.radius);
        }

        // ---- Peace split beams ----
        for (const h of App.handData) {
          if (h.peace) {
            p.stroke(130, 80, 100, 120); p.strokeWeight(1.5);
            p.line(h.indexTip.x*S, h.indexTip.y*S, h.indexTip.x*S-60, h.indexTip.y*S-120);
            p.line(h.sLms[12].x*S, h.sLms[12].y*S, h.sLms[12].x*S+60, h.sLms[12].y*S-120);
          }
        }

        // ---- Shaka sparkles ----
        if (App.globalGesture === "SHAKA") {
          for (const h of App.handData) {
            if (h.shaka) {
              for (let s=0; s<3; s++) {
                const sx = h.palm.x*S + (Math.random()-0.5)*100;
                const sy = h.palm.y*S + (Math.random()-0.5)*100;
                p.noStroke(); p.fill(50, 90, 100, 160+Math.random()*80);
                p.circle(sx, sy, 2+Math.random()*3);
              }
            }
          }
        }

        // ---- Vortex ring (THREE_FINGERS) ----
        if (App.globalGesture === "VORTEX") {
          App.vortexAngle += 0.06;
          for (const h of App.handData) {
            if (h.threeFingers) {
              const cx = h.palm.x*S, cy = h.palm.y*S;
              p.noFill();
              for (let r=0; r<3; r++) {
                const ang = App.vortexAngle + r*(Math.PI*2/3);
                const rx = cx + Math.cos(ang)*55;
                const ry = cy + Math.sin(ang)*55;
                p.stroke(190+r*30, 70, 95, 140);
                p.strokeWeight(1.5);
                p.circle(rx, ry, 10);
              }
              p.stroke(200, 40, 80, 50); p.strokeWeight(0.8);
              p.noFill(); p.circle(cx, cy, 110);
            }
          }
        }

        // ---- Draw hand skeleton ----
        drawHands(p, S);

        // ---- HUD ----
        const now = performance.now();
        if (now - App.lastHudUpdate > CONFIG.hudUpdateMs) {
          App.lastHudUpdate = now;
          document.getElementById("fps").textContent       = Math.round(p.frameRate());
          document.getElementById("handCount").textContent  = App.handData.length;
          document.getElementById("gesture").textContent    = App.globalGesture;
          document.getElementById("pCount").textContent     = particles.length;
        }
      };
    };

    // ---- Minimal hand drawing ----
    function drawHands(p, S) {
      for (const h of App.handData) {
        const lms = h.sLms;
        p.stroke(190, 60, 100, 55); p.strokeWeight(1);
        for (const [a,b] of HAND_CONNECTIONS) {
          p.line(lms[a].x*S, lms[a].y*S, lms[b].x*S, lms[b].y*S);
        }
        p.noStroke();
        for (let i=0; i<lms.length; i++) {
          if (i===4||i===8) {
            p.fill(300, 80, 100, 180);
            p.circle(lms[i].x*S, lms[i].y*S, 7);
          } else {
            p.fill(190, 60, 100, 55);
            p.circle(lms[i].x*S, lms[i].y*S, 3);
          }
        }
        if (h.pinching) {
          p.stroke(300, 80, 100, 180); p.strokeWeight(2);
          p.line(h.thumbTip.x*S, h.thumbTip.y*S, h.indexTip.x*S, h.indexTip.y*S);
        }
        if (h.thumbsUp) {
          p.noFill(); p.stroke(120, 80, 100, 160); p.strokeWeight(1.5);
          p.circle(h.palm.x*S, h.palm.y*S, 55);
        }
        if (h.fist) {
          p.noFill(); p.stroke(20, 100, 100, 200); p.strokeWeight(2);
          p.circle(h.palm.x*S, h.palm.y*S, 45);
        }
      }
    }

    // =============================================================
    //  STARTUP
    // =============================================================
    document.getElementById("startBtn").addEventListener("click", async () => {
      const status  = document.getElementById("status");
      const overlay = document.getElementById("startOverlay");
      const video   = document.getElementById("webcam");

      try {
        status.textContent = "Requesting camera…";
        App.video = video;

        const stream = await navigator.mediaDevices.getUserMedia({
          audio: false,
          video: {
            facingMode: "user",
            width:     { ideal: CONFIG.cameraWidth },
            height:    { ideal: CONFIG.cameraHeight },
            frameRate: { ideal: CONFIG.cameraFPS, max: CONFIG.cameraFPS }
          }
        });
        video.srcObject = stream;
        await video.play();

        status.textContent = "Loading hand model (lite)…";
        await setupHands();

        status.textContent = "Launching renderer…";
        new p5(sketch);

        App.started = true;
        trackingLoop();

        overlay.style.display = "none";
      } catch (err) {
        console.error(err);
        status.textContent = "Error: " + (err.message || "Could not start");
      }
    });
  </script>
</body>
</html>
